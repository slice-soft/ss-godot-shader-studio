name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-pr:
    if: github.event_name == 'pull_request'
    uses: slice-soft/ss-pipeline/.github/workflows/validate-pr.yml@v0
    secrets: inherit

  test:
    uses: slice-soft/ss-pipeline/.github/workflows/ci-godot.yml@v0
    with:
      godot-version: "4.5"
      test-command: godot --headless --editor --path . --script test/runner.gd
